name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Skip commits that were auto-generated by this same workflow
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Auto-bump patch version ──────────────────────────────────────────────
      - name: Bump patch version
        id: version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          npm version patch --no-git-tag-version --prefix frontend
          npm version patch --no-git-tag-version --prefix backend
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          git add package.json frontend/package.json backend/package.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      # ── Validate builds (catch errors before hitting the server) ─────────────
      - name: Build frontend (validate)
        run: |
          npm install --include=dev --prefix frontend
          npm run build --prefix frontend

      - name: Build backend (validate)
        run: |
          npm install --include=dev --prefix backend
          npm run build --prefix backend

      # ── Deploy to Hostinger via SSH ──────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            APP_DIR=~/domains/neurofic.easystem.co/nodejs

            echo "=== Pulling latest code ==="
            cd "$APP_DIR"
            git pull origin main

            echo "=== Installing backend dependencies ==="
            npm install --prefix backend --omit=dev

            echo "=== Running database migrations ==="
            npm run db:migrate --prefix backend

            echo "=== Building backend ==="
            npm run build --prefix backend

            echo "=== Installing frontend dependencies ==="
            npm install --prefix frontend --omit=dev

            echo "=== Building frontend ==="
            npm run build --prefix frontend

            echo "=== Writing COMMIT_SHA for /api/version ==="
            COMMIT=$(git rev-parse --short HEAD)
            sed -i "s/^COMMIT_SHA=.*/COMMIT_SHA=$COMMIT/" .env 2>/dev/null || echo "COMMIT_SHA=$COMMIT" >> .env

            echo "=== Restarting application (Passenger) ==="
            mkdir -p "$APP_DIR/tmp"
            touch "$APP_DIR/tmp/restart.txt"

            echo "=== Deploy complete — version $(node -p "require('./package.json').version") ==="
